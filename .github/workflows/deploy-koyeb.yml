name: Deploy to Koyeb

on:
  push:
    branches: [master]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy on Koyeb
        run: |
          curl -sf -X POST "https://app.koyeb.com/v1/apps/${{ secrets.KOYEB_APP_ID }}/redeploy" \
            -H "Authorization: Bearer ${{ secrets.KOYEB_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
